# mkdocs.yml — PowerStacks Docs (consolidated)
# ────────────────────────────────────────────────────────────────
# Consolidated documentation site for BI for Intune, BI for SCCM,
# and BI for Defender. Migrated from three separate repos.
#
# Domain: https://docs.powerstacks.com
# Repo:   powerstacks-corp/powerstacks-docs
# ────────────────────────────────────────────────────────────────

site_name: PowerStacks Docs
site_url: https://docs.powerstacks.com/
site_description: >
  PowerStacks product documentation — BI for Intune, BI for SCCM,
  and BI for Defender. Setup guides, administration references,
  and release notes for Microsoft endpoint-management reporting.
copyright: Copyright &copy; 2026 PowerStacks

# URLs read by overrides/main.html for the global nav and assistant widget.
# Override locally with:
#   MARKETING_URL=http://localhost:4321 ASSISTANT_URL=http://localhost:3000 mkdocs serve
extra:
  marketing_url: !ENV [MARKETING_URL, "https://powerstacks.com"]
  assistant_url: !ENV [ASSISTANT_URL, "http://localhost:3000"]

# ────────────────────────────────────────────────────────────────
# Theme
# ────────────────────────────────────────────────────────────────
theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.webp
  favicon: assets/favicon.ico
  font: false  # Use site-wide fonts from powerstacks-nav.css, not Google Fonts
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections         # group pages under section headers
    - navigation.indexes          # section titles can be clickable index pages
    - navigation.top              # back-to-top button
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
    # REMOVED: navigation.tabs    — no MkDocs tab bar (unified PowerStacks nav only)
    # REMOVED: navigation.expand  — only expand the active product's section
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/microsoft-learn.css    # existing hero + content styling
  - stylesheets/powerstacks-nav.css    # ported marketing-site nav
  - stylesheets/storylane.css          # Storylane embed wrapper

extra_javascript:
  - scripts/powerstacks-nav.js         # scroll-aware nav + mobile menu

# ────────────────────────────────────────────────────────────────
# Markdown
# ────────────────────────────────────────────────────────────────
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ────────────────────────────────────────────────────────────────
# Plugins
# ────────────────────────────────────────────────────────────────
plugins:
  - search
  - macros:                        # mkdocs-macros-plugin
      module_name: macros          # reads ./macros.py
      # provides: storylane(), release_archive()
  - glightbox:
      skip_classes:
        - skip-lightbox
  - rss:                           # mkdocs-rss-plugin
      match_path: "bi-for-.+/release-notes/version-.+"
      date_from_meta:
        as_creation: date
      categories:
        - tags

# Individual release-notes version pages exist as files (direct URL +
# search still work) but aren't listed in the sidebar. Latest and Archive
# pages list them via the release_archive() macro.
# Pattern matches both `version-` (singular) and `versions-` (plural,
# used historically for combined multi-version releases).
not_in_nav: |
  bi-for-intune/release-notes/version*-*.md
  bi-for-sccm/release-notes/version*-*.md
  bi-for-defender/release-notes/version*-*.md

